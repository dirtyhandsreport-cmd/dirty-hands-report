    const k = document.getElementById('key-input').value.trim();

    localStorage.removeItem('dhr_anthropic_key');

    document.getElementById('loading').style.display='none';

  }, 120000);
</script>

async function fetchHeadlines(query,count=20){
  const raw=await ai(`Search for recent news: ${query}`,
    `Oil and gas news aggregator. TODAY is ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}. Search aggressively for articles published THIS WEEK — prioritize TODAY and YESTERDAY above all else. Return ONLY raw JSON array, no other text. Each object: "title","source","date"(exact like "Apr 4, 2026"),"time"(like "6:42 AM" or ""),"summary"(max 20 words),"url"(real URL or "#"),"sentiment"("bullish","bearish","neutral"). Up to ${count} items newest first. Start [ end ].`,4096);
  const p=safeJSON(raw);
  if(!p||!p.length)throw new Error("Parse failed: "+raw.slice(0,200));
  const str = v => (v==null ? "" : typeof v==="object" ? JSON.stringify(v) : String(v));
  return p.map(h=>({
    title:     str(h.title),
    source:    str(h.source),
    date:      str(h.date),
    time:      str(h.time),
    summary:   str(h.summary),
    url:       str(h.url)||"#",
    sentiment: str(h.sentiment)||"neutral",
    dhrScore:  getDHRScore(h),
  }));
}

  if(b==="THIS WEEK")return 1;
  return 0;
};
const combinedScore=h=>(recencyScore(h)*10)+h.dhrScore;

function buildTopPostsContext(posts=[]){
  return posts
    .filter(p=>{
      const msg=(p.message||p.content||"").toLowerCase();
      const isJob=msg.includes("hiring")||msg.includes("job")||msg.includes("position")||msg.includes("apply now");
      const eng=(p.likes||0)+(p.comments||0)+(p.shares||0);
      return !isJob&&eng>=100;
    })
    .sort((a,b)=>((b.likes||0)+(b.comments||0)+(b.shares||0))-((a.likes||0)+(a.comments||0)+(a.shares||0)))
    .slice(0,10)
    .map(p=>{

      const hook=(p.message||p.content||"").split("\n")[0].slice(0,120);
      return `- "${hook}" — ${eng.toLocaleString()} engagement`;
    })
    .join("\n");
}

async function fetchBestHeadlines(exclude=[]){
  const headlines=await fetchHeadlines(`oilfield oil gas energy industry news ${TODAY_DATE}`,20);
  return [...headlines]
    .filter(h=>!exclude.includes(h.title))
    .sort((a,b)=>combinedScore(b)-combinedScore(a));
}

async function checkBetter(current){
  try{
    const sorted=await fetchBestHeadlines([current.headline.title]);
    const best=sorted[0];
    if(best&&combinedScore(best)>combinedScore(current.headline))return best;
  }catch(_e){}
  return null;
}

const REPLY_SYSTEM=`You're writing Facebook replies for Gage — the guy behind The Dirty Hands Report. Wireline operator, 14+ years in the field across 8 states and multiple basins. Runs DHR on the side. Been on location more mornings than he can count.

Voice:
- Terse. Not rude — just economical. He talks like someone who's been awake since 4am and has a truck to catch.
- Dry humor when it fits. Not performed, not forced — the kind that comes out because the situation is genuinely absurd. He'll laugh at the industry, at himself, at someone who wandered into the wrong comment section.
- Doesn't announce what he knows. Just says it. No "actually" or "well the thing is" or "great question."
- Field-specific when it lands naturally — not to flex, just because that's the language he thinks in.
- If someone's wrong he corrects it once, clean, no follow-up lecture.
- If someone's right he might add one thing they missed. Short.
- Confident without performing confidence. The knowledge is real so he doesn't need to dress it up.
- Reads like a reply typed on a phone between jobs, not a LinkedIn comment.

Hard rules:
- 1 to 3 sentences max. Never an essay.
- All facts 100% verifiable. If not certain, leave it out. Never invent numbers.
- No hashtags. No emojis unless one earns its place.

      if(!pick){setGenerating(p=>p.filter(k=>k!==slotKey));return;}
      try{
        const result=await generatePost(pick,slotLabel,buildTopPostsContext(fbPagePosts));
        setDailySlots(p=>({...p,[slotKey]:{...result,date:today}}));
        setArchive(p=>[result,...p]);
        showToast("✓ SLOT REFRESHED");
      }catch(_e){showToast("REFRESH FAILED");}
      setGenerating(p=>p.filter(k=>k!==slotKey));
    }).catch(()=>{setGenerating(p=>p.filter(k=>k!==slotKey));showToast("FETCH FAILED");});
  };

  const refreshAll=()=>{DAILY_SLOTS.forEach(slot=>refreshSlot(slot.key));};

  const saveHook=(text,removeIdx=null)=>{
    if(removeIdx!==null){setHookLibrary(p=>p.filter((_,i)=>i!==removeIdx));return;}
    if(text&&!hookLibrary.includes(text))setHookLibrary(p=>[text,...p]);
    showToast("✓ HOOK SAVED");
  };
  const saveToReply=({title,content})=>{
    if(!title)return;
    const exists=savedPosts.some(p=>p.title===title);
    if(!exists){setSavedPosts(p=>[{title,content,savedAt:new Date().toLocaleString()},...p]);showToast("✓ POST SAVED TO REPLY");}
    else showToast("ALREADY SAVED");
  };
  const addManualPost=({title,content})=>{
    if(title&&!savedPosts.some(p=>p.title===title))setSavedPosts(p=>[{title,content,savedAt:new Date().toLocaleString()},...p]);
  };
  const removePost=title=>setSavedPosts(p=>p.filter(x=>x.title!==title));

  const NAV=[
    {k:"daily",    icon:"📋", label:"DAILY"},
    {k:"news",     icon:"⛽", label:"NEWS"},
    {k:"viral",    icon:"🔥", label:"VIRAL"},
    {k:"write",    icon:"✍",  label:"WRITE"},
    {k:"realtalk", icon:"💡", label:"REAL TALK"},
    {k:"jobs",     icon:"🔧", label:"JOBS"},
    {k:"sponsors", icon:"💰", label:"SPONSORS"},
    {k:"reply",    icon:"💬", label:"REPLY"},
    {k:"brand",    icon:"🎨", label:"BRAND"},
  ];

  return(
    React.createElement('div', { style: {minHeight:"100vh",background:"#0a0a0f",color:"#f0ece4",fontFamily:"'Barlow Condensed','Arial Narrow',Arial,sans-serif",paddingBottom:100},}
      , React.createElement('style', null, CSS)
      , toast&&React.createElement('div', { className: "toast",}, toast)

      /* Facebook Setup Modal */
      , showFbSetup&&(
        React.createElement('div', { style: {position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20},}
          , React.createElement('div', { style: {background:"#111118",borderRadius:16,padding:20,width:"100%",maxWidth:400,border:"1px solid rgba(240,90,26,.3)"},}
            , React.createElement('div', { style: {fontSize:9,fontWeight:800,letterSpacing:".16em",color:"#f05a1a",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4,textTransform:"uppercase"},}, "FACEBOOK SETUP" )
            , React.createElement('div', { style: {fontSize:11,color:"rgba(240,236,228,.35)",fontFamily:"'Barlow',sans-serif",lineHeight:1.5,marginBottom:14},}, "Enter your Page Access Token and Page ID. Token is stored locally — never sent anywhere except Facebook's API."                  )
            , React.createElement('input', { value: fbTokenInput, onChange: e=>setFbTokenInput(e.target.value), placeholder: "Page Access Token..."  , style: {width:"100%",background:"#080808",border:"1px solid #1e1e2a",borderRadius:8,color:"#f0ece4",fontFamily:"'Barlow',sans-serif",fontSize:12,padding:"10px 12px",outline:"none",marginBottom:8},})
            , React.createElement('input', { value: fbPageIdInput, onChange: e=>setFbPageIdInput(e.target.value), placeholder: "Page ID (numbers only, e.g. 123456789)"     , style: {width:"100%",background:"#080808",border:"1px solid #1e1e2a",borderRadius:8,color:"#f0ece4",fontFamily:"'Barlow',sans-serif",fontSize:12,padding:"10px 12px",outline:"none",marginBottom:14},})
            , React.createElement('div', { style: {display:"flex",gap:8},}
              , React.createElement('button', { onClick: saveFbCreds, disabled: !fbTokenInput.trim()||!fbPageIdInput.trim(), style: {flex:1,background:"#f05a1a",border:"none",borderRadius:8,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,letterSpacing:".1em",padding:"11px 0",cursor:"pointer",textTransform:"uppercase",opacity:fbTokenInput.trim()&&fbPageIdInput.trim()?1:.4},}, "CONNECT")
              , fbToken&&React.createElement('button', { onClick: ()=>{setShowFbSetup(false);fetchAllFBData(fbToken,fbPageId,true);}, style: {flex:1,background:"transparent",border:"1px solid rgba(24,119,242,.4)",borderRadius:8,color:"#4f9cf9",fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:".1em",padding:"11px 0",cursor:"pointer",textTransform:"uppercase"},}, "↻ FORCE SYNC"  )
              , React.createElement('button', { onClick: ()=>setShowFbSetup(false), style: {flex:1,background:"transparent",border:"1px solid #1e1e2a",borderRadius:8,color:"rgba(240,236,228,.35)",fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:".1em",padding:"11px 0",cursor:"pointer",textTransform:"uppercase"},}, "CANCEL")
            )
          )
        )
      )

      /* RealTalk idea → PostModal */
      , realTalkIdea&&React.createElement(PostModal, {
        headline: {title:realTalkIdea.hook,summary:realTalkIdea.why,source:"REAL TALK — DHR CULTURE POST"},
        onClose: ()=>setRealTalkIdea(null),
        hookLibrary: hookLibrary,
        onSaveHook: saveHook,
        onSaveToReply: saveToReply,
        onSave: item=>{setPostHistory(p=>[item,...p]);showToast("✓ SAVED TO HISTORY");setRealTalkIdea(null);},
        onPostToFacebook: postToFacebook,
        fbConnected: !!fbToken,
        fbPosting: fbPosting,}
      )

      , genFor&&React.createElement(PostModal, {
        headline: genFor,
        onClose: ()=>setGenFor(null),
        hookLibrary: hookLibrary,
        onSaveHook: saveHook,
        onSaveToReply: saveToReply,
        onSave: item=>{setPostHistory(p=>[item,...p]);showToast("✓ SAVED TO HISTORY");},
        onPostToFacebook: postToFacebook,
        fbConnected: !!fbToken,
        fbPosting: fbPosting,}
      )
      , schedFor&&React.createElement(SchedModal, { headline: schedFor, onClose: ()=>setSchedFor(null), onSave: ()=>showToast("✓ ADDED TO CALENDAR"),})
      , React.createElement(PriceTicker, null)
      , React.createElement('div', { className: "screen", key: screen,}
        , screen==="daily"    && React.createElement(DailyScreen, {   dailySlots: dailySlots, archive: archive, generating: generating, onMarkUsed: markUsed, onReplace: replaceSlot, onToast: showToast, fbToken: fbToken, fbData: fbData, onPostToFacebook: postToFacebook, fbPosting: fbPosting, onFbSetup: ()=>{setFbTokenInput(fbToken);setFbPageIdInput(fbPageId);setShowFbSetup(true);}, onRefreshSlot: refreshSlot, onRefreshAll: refreshAll,})
        , screen==="news"     && React.createElement(NewsScreen, {    onGen: setGenFor, onSchedule: setSchedFor, onToast: showToast,})
        , screen==="viral"    && React.createElement(ViralScreen, {   onGen: setGenFor, onSchedule: setSchedFor, onToast: showToast,})
        , screen==="write"    && React.createElement(WriteScreen, {   postHistory: postHistory, onToast: showToast, hookLibrary: hookLibrary, onSaveHook: saveHook, onSaveToReply: saveToReply, savedPosts: savedPosts, onRemovePost: removePost, fbData: fbData,})
        , screen==="realtalk" && React.createElement(RealTalkScreen, { onToast: showToast, postHistory: postHistory, fbPagePosts: fbPagePosts, fbData: fbData, onWriteIdea: idea=>{setRealTalkIdea(idea);},})
        , screen==="sponsors" && React.createElement(SponsorScreen, { onToast: showToast, fbData: fbData,})
        , screen==="jobs"     && React.createElement(JobsScreen, {    onToast: showToast,})
        , screen==="reply"    && React.createElement(ReplyScreen, {   onToast: showToast, savedPosts: savedPosts, fbPagePosts: fbPagePosts,})
        , screen==="brand"    && React.createElement(BrandScreen, {   fbToken: fbToken, fbPageId: fbPageId, fbData: fbData, onFbSetup: ()=>{setFbTokenInput(fbToken);setFbPageIdInput(fbPageId);setShowFbSetup(true);}, onForceSync: ()=>fetchAllFBData(fbToken,fbPageId,true), onToast: showToast,})
      )
      , React.createElement('nav', { className: "nav-bar",}
        , NAV.map(n=>(
          React.createElement('button', { key: n.k, className: `nav-btn ${screen===n.k?"on":""}`, onClick: ()=>setScreen(n.k),}
            , React.createElement('div', { className: "nav-icon-bg",}, React.createElement('span', { className: "nav-icon",}, n.icon))
            , n.label
          )
        ))
      )
    )
  );
}

window.renderApp = function(){
  try{
    const root = document.getElementById('root');
    document.getElementById('loading').style.display='none';
    if(window._clearLoadInterval) window._clearLoadInterval();
    if(root._reactRoot){ root._reactRoot.render(React.createElement(DHRFactory, null)); return; }
    const r = ReactDOM.createRoot(root);
    root._reactRoot = r;
    r.render(React.createElement(DHRFactory, null));
  }catch(e){
    document.getElementById('loading').style.display='none';
    if(window._clearLoadInterval) window._clearLoadInterval();
    document.getElementById('err').style.display='flex';
    document.getElementById('err-msg').textContent=e.stack||e.message||String(e);
  }
};
if(window.ANTHROPIC_KEY) window.renderApp();

</script>
</body>
</html>
