<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Received</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #f0ece4; font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.box { max-width: 480px; background: #141414; border-left: 4px solid #f05a1a; padding: 48px; text-align: center; }
.check { font-size: 48px; margin-bottom: 24px; }
h1 { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-bottom: 16px; }
h1 span { color: #f05a1a; }
p { font-size: 15px; color: #777; line-height: 1.8; }
.brand { margin-top: 32px; font-size: 12px; color: #333; }
.brand span { color: #f05a1a; }
</style>
</head>
<body>
<div class="box">
  <div class="check">✅</div>
  <h1>Application <span>Received</span></h1>
  <p>Thanks for applying to Smithies Hotshot Service LLC. A member of our team will review your application and be in touch soon.</p>
  <div class="brand" style="margin-top:32px;">Powered by <span>The Dirty Hands Report</span></div>
</div>
</body>
</html>
