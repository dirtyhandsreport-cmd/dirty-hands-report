<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{background:#080808;color:#f0ece4;font-family:'Arial Narrow',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
  h2{color:#f05a1a;letter-spacing:.1em;font-size:18px;margin-bottom:8px;}
  p{color:rgba(240,236,228,.5);font-size:13px;text-align:center;margin-bottom:24px;}
  button{background:#f05a1a;border:none;color:#fff;font-size:16px;font-weight:900;letter-spacing:.1em;padding:16px 32px;border-radius:10px;cursor:pointer;width:100%;max-width:320px;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  #status{margin-top:20px;font-size:14px;text-align:center;line-height:1.6;max-width:320px;word-break:break-word;}
  .ok{color:#22c55e;font-weight:700;} .err{color:#ef4444;font-weight:700;}
</style>
</head>
<body>
<h2>DHR WORKER DEPLOY</h2>
<p>Pushes FB proxy code to Cloudflare Worker.</p>
<button id="btn" onclick="deploy()">DEPLOY NOW</button>
<div id="status"></div>
<script>
async function deploy(){
  const btn=document.getElementById('btn');
  const status=document.getElementById('status');
  btn.disabled=true; btn.textContent='DEPLOYING...'; status.innerHTML='Pushing...';
  const code=`const FB_TOKEN="EAAoWza7AAJoBRHZBoigKWfrE4HacicbSCXVB9LTZCEA0VzKvJYW88tSMTqOoztReHG55ZC3L4NzxUbnRmcJvezSWly6WPjLgLdr2KhzjkSt55VD8PYpPAfxCrx71jMz98jhoqOO1J1iJhbmz7Yr78gurPvfX2EpFNZCqgXBbJlnNC6urEDjGzGAR5iJPnBxfPaCf2OVpSOgTdG3zMJce02IbNGXnznFxzaTK9QYXsQL3BdKmN8QZD";
const FB_PAGE_ID="895200170345079";
const FB_BASE="https://graph.facebook.com/v19.0";
addEventListener("fetch",event=>{event.respondWith(handleRequest(event.request));});
async function handleRequest(request){
  const cors={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Headers":"Content-Type","Access-Control-Allow-Methods":"POST, OPTIONS","Content-Type":"application/json"};
  if(request.method==="OPTIONS")return new Response("",{headers:cors});
  if(request.method!=="POST")return new Response(JSON.stringify({error:"POST only"}),{headers:cors});
  let body;
  try{body=await request.json();}catch(e){return new Response(JSON.stringify({error:"Invalid JSON"}),{headers:cors});}
  const{action,message}=body;
  try{
    if(action==="sync"){
      const[pageRes,insightRes,postsRes]=await Promise.all([
        fetch(FB_BASE+"/"+FB_PAGE_ID+"?fields=followers_count,fan_count,name&access_token="+FB_TOKEN),
        fetch(FB_BASE+"/"+FB_PAGE_ID+"/insights?metric=page_impressions,page_impressions_unique,page_engaged_users&period=month&access_token="+FB_TOKEN),
        fetch(FB_BASE+"/"+FB_PAGE_ID+"/posts?fields=message,created_time,likes.summary(true),comments.summary(true),shares,insights.metric(post_impressions,post_reach)&limit=100&access_token="+FB_TOKEN)
      ]);
      const page=await pageRes.json();
      const insight=await insightRes.json();
      const posts=await postsRes.json();
      if(page.error)return new Response(JSON.stringify({error:page.error.message}),{headers:cors});
      return new Response(JSON.stringify({page,insight,posts:posts.data||[]}),{headers:cors});
    }
    if(action==="post"&&message){
      const res=await fetch(FB_BASE+"/"+FB_PAGE_ID+"/feed",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:message,access_token:FB_TOKEN})});
      const data=await res.json();
      return new Response(JSON.stringify(data),{headers:cors});
    }
    return new Response(JSON.stringify({error:"Unknown action"}),{headers:cors});
  }catch(err){return new Response(JSON.stringify({error:err.message}),{headers:cors});}
}`;
  try{
    const res=await fetch("https://api.cloudflare.com/client/v4/accounts/977130ff9c5d01fabbff636fd4f85e48/workers/scripts/dhr-proxy",{
      method:"PUT",
      headers:{"X-Auth-Email":"admin@dirtyhandsoil.com","X-Auth-Key":"cfk_0UD8wICUwoAY8zGtGMB5mTrc5EJv26aGcEp3g8jS1d1d2556","Content-Type":"application/javascript"},
      body:code
    });
    const data=await res.json();
    if(data.success){
      status.innerHTML='<span class="ok">✓ DEPLOYED</span><br><br>Load DHR Factory and force sync.';
      btn.textContent='✓ DONE';
    }else{
      const msg=(data.errors||[]).map(e=>e.message).join(', ')||JSON.stringify(data);
      status.innerHTML='<span class="err">FAILED: '+msg+'</span>';
      btn.disabled=false; btn.textContent='RETRY';
    }
  }catch(err){
    status.innerHTML='<span class="err">ERROR: '+err.message+'</span>';
    btn.disabled=false; btn.textContent='RETRY';
  }
}
</script>
</body>
</html>
