function sx(s=""){return s.replace(/<[^>]*>/g,"").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ").trim();}
function pd(s=""){try{const d=new Date(s);if(!isNaN(d))return d.toISOString();}catch(_){}return new Date().toISOString();}
function parseRSS(xml,feed){
  const items=[];const re=/<item[^>]*>([\\s\\S]*?)<\\/item>/gi;let m;
  while((m=re.exec(xml))!==null){
    const b=m[1];
    const get=tag=>{const r=b.match(new RegExp("<"+tag+"[^>]*>(?:<!\\\\[CDATA\\\\[)?([\\\\s\\\\S]*?)(?:\\\\]\\\\]>)?</"+tag+">","i"));return r?sx(r[1]):"";};
    const title=get("title");if(!title)continue;
    items.push({title:title.slice(0,160),source:feed.source,url:get("link")||get("guid")||"#",date:pd(get("pubDate")||get("dc:date")||get("published")),summary:sx(get("description")||get("summary")||"").slice(0,200),sentiment:"neutral"});
  }
  return items;
}
addEventListener("fetch",event=>{event.respondWith(handleRequest(event.request));});
async function handleRequest(request){
  const cors={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Headers":"Content-Type","Access-Control-Allow-Methods":"POST, OPTIONS","Content-Type":"application/json"};
  if(request.method==="OPTIONS")return new Response("",{headers:cors});
  if(request.method!=="POST")return new Response(JSON.stringify({error:"POST only"}),{headers:cors});

    if(action==="sync"){

        fetch(FB_BASE+"/"+FB_PAGE_ID+"?fields=followers_count,fan_count,name&access_token="+FB_TOKEN),
        fetch(FB_BASE+"/"+FB_PAGE_ID+"/insights?metric=page_impressions,page_impressions_unique,page_engaged_users&period=month&access_token="+FB_TOKEN),
        fetch(FB_BASE+"/"+FB_PAGE_ID+"/posts?fields=message,created_time,likes.summary(true),comments.summary(true),shares,insights.metric(post_impressions,post_reach)&limit=100&access_token="+FB_TOKEN)
      ]);
      const page=await pageRes.json();const insight=await insightRes.json();const posts=await postsRes.json();
      if(page.error)return new Response(JSON.stringify({error:page.error.message}),{headers:cors});
      return new Response(JSON.stringify({page,insight,posts:posts.data||[]}),{headers:cors});
    }
    if(action==="post"&&message){

      const seen=new Set();const all=[];
      for(const list of results)for(const item of list){const k=item.title.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,60);if(!seen.has(k)){seen.add(k);all.push(item);}}
      all.sort((a,b)=>new Date(b.date)-new Date(a.date));
      return new Response(JSON.stringify({ok:true,count:all.length,items:all}),{headers:{...cors,"Cache-Control":"public, max-age=180"}});
    }
    if(action==="fetch_article"&&url){
      const res=await fetch(url,{headers:{"User-Agent":"Mozilla/5.0 (compatible; DHRBot/1.0)"}});
      if(!res.ok)return new Response(JSON.stringify({ok:false,blocked:true}),{headers:cors});

      return new Response(JSON.stringify({ok:true,text:text.slice(0,6000)}),{headers:cors});
    }

      return new Response(JSON.stringify(await aRes.json()),{status:aRes.status,headers:cors});
    }
    return new Response(JSON.stringify({error:"Unknown action"}),{headers:cors});
  }catch(err){return new Response(JSON.stringify({error:err.message}),{headers:cors});}
