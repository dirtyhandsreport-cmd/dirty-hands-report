name: Deploy DHR FB Proxy Worker

on:
  push:
    paths:
      - 'worker.js'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Cloudflare Workers
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/977130ff9c5d01fabbff636fd4f85e48/workers/scripts/dhr-proxy" \
            -H "X-Auth-Email: admin@dirtyhandsoil.com" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/javascript" \
            --data-binary @worker.js
